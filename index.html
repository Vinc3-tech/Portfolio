<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <!--collegamenti css-->
    <link rel="stylesheet" href="src/css/colori.css">
    <link rel="stylesheet" href="src/css/font.css">
    <link rel="stylesheet" href="style.css">
    <!--font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap" rel="stylesheet">
</head>
<body>

    <!--loading section-->
    <section class="loading-section">

        <div class="zona-sopra">
            <div id="print" class="secondary-font">print("Hello World!!")</div>
        </div>

        <div class="zona-centro">
            <div id="linea">
                <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                    <line class="line-right" x1="50%" y1="50%" x2="100%" y2="50%" stroke="var(--highlight-2)" stroke-width="3" stroke-dasharray="100" stroke-dashoffset="100"/>
                    <line class="line-left" x1="50%" y1="50%" x2="0%" y2="50%" stroke="var(--highlight-2)" stroke-width="3" stroke-dasharray="100" stroke-dashoffset="100"/>
                </svg>
            </div>
            <div id="circle">
                <svg height="500" width="500" xmlns="http://www.w3.org/2000/svg">
                    <circle r="250" cx="250" cy="250" fill="var(--highlight)"/>
                </svg>
            </div>
            <div id="scritte">
                <h3 id="loading-text" class="secondary-font">Loading...</h3>
                <h1 id="title-caricamento" class="title-font">Portfolio</h1>
                <h3 id="madeBy-text" class="secondary-font"><span>Made by</span><br><span>Vincenzo</span></h3>
            </div>
        </div>

        <div class="zona-sotto">
            <div id="percentuale-caricamento">0%</div>
        </div>
    </section>

    <!--menù-->
    <div class="menu">
        <ul>
            <li id="voce" class="title-font"><a href="">index</a></li>
            <li id="voce" class="title-font"><a href="">my work</a></li>
            <li id="voce" class="title-font"><a href="">about me</a></li>
            <li id="voce" class="title-font"><a href="">contacts</a></li>
        </ul>
        <button id="btn-close" class="secondary-font">Close</button>
    </div>

    <!--navbar-->
    <navbar class="navbar secondary-font">
        <span id="scritte_centrali">{ Frontend developer / web-designer }</span>
        <ul>
            <li id="logo"><a href="#">Vincenzo Venturino</a></li>
            <li id="menu"><a href="#menu">Menù</a></li>
        </ul>
    </navbar>

    <!--hero page-->
    <section class="hero-section title-font">
        <div id="introduction">
            <h1 id="impact-text">
                <span class="word"><span>The</span></span>
                <span class="word secondary-font italic highlighted-text"><span>art</span></span>
                <span class="word"><span>of</span></span>
                <span class="word"><span>&ltcoding&gt</span></span>
            </h1>
        </div>
        <div id="scritta-lato1">
            <p class="testo-verticale jp-font">私は私なりのやり方でやる</p>
        </div>
        <div id="scritta-lato2">
            <p class="testo-verticale secondary-font">I do it in my way</p>
        </div>
    </section>

    <!--sezione frase effetto-->
    <section class="frase-section">
        <div class="frase-effetto">
            <h1 class="title-font" id="riga1"><span class="italic secondary-font">Design,</span> Codice, <span class="italic secondary-font">Creatività</span>. Tutto parte da qui.</h1>
        </div>
    </section>

    <!--collegamenti x js e gsap-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/SplitText.min.js"></script>
    <script src="src/js/animation/intro.js"></script>
    <script src="src/js/main.js"></script>
    
</body>
</html>
