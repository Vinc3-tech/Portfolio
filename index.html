<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <!--collegamenti css-->
    <link rel="stylesheet" href="src/css/colori.css">
    <link rel="stylesheet" href="src/css/font.css">
    <link rel="stylesheet" href="style.css">
    <!--font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Zen+Old+Mincho&display=swap" rel="stylesheet">
</head>
<body>

    <!--loading section-->
    <div class="loading-section">
        <div class="zona-sopra">
            <div id="print" class="title-font">print("Hello World!!")</div>
        </div>
        <div class="zona-centro">
            <div id="linea">
                <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- metà destra: dal centro verso destra -->
                    <line class="line-right" x1="50%" y1="50%" x2="100%" y2="50%" stroke="var(--highlight-2)" stroke-width="3"/>
                    <!-- metà sinistra: dal centro verso sinistra -->
                    <line class="line-left" x1="50%" y1="50%" x2="0%" y2="50%" stroke="var(--highlight-2)" stroke-width="3"/>
                </svg>
            </div>
            <div id="circle">
                <svg height="500" width="500" xmlns="http://www.w3.org/2000/svg">
                    <circle r="250" cx="250" cy="250" fill="var(--highlight)"/>
                </svg>
            </div>
            <div id="scritte">
                <h3 id="loading-text" class="secondary-font">Loading...</h3>
                <h1 id="title-caricamento" class="title-font">Portfolio</h1>
                <h3 id="madeBy-text" class="secondary-font"><span>Made by</span><br><span>Vincenzo</span></h3>
            </div>
        </div>
        <div class="zona-sotto">
            <div id="percentuale-caricamento">100%</div>
        </div>
    </div>

    <!--navbar-->
    <div class="navbar secondary-font">
        <span id="scritte_centrali">{ Frontend developer / web-designer }</span>
        <ul>
            <li id="logo"><a href="#">Vincenzo Venturino</a></li>
            <li id="n_link"><a href="#project">Project</a></li>
            <li id="n_link"><a href="#contact">Contact</a></li>
            <li id="n_link"><a href="#about">About</a></li>
        </ul>
    </div>

    <!--hero page-->
    <div class="hero-section title-font">
        <div id="introduction">
            <span id="name"><span class="parola">Hi </span><span class="parola">I'm</span><br><span class="parola">Vincenzo</span><br><span class="parola">Venturino</span></span>
        </div>
    </div>

    <!--collegamenti x js e gsap-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="src/js/animation/intro.js"></script>
    <script src="src/js/main.js"></script>
    
</body>
</html>
