<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <!--collegamenti css-->
    <link rel="stylesheet" href="src/css/colori.css">

            </div>
            <div id="circle">
                <svg height="500" width="500" xmlns="http://www.w3.org/2000/svg">

            </div>
            <div id="scritte">

        </div>
        <div class="zona-sotto">

        </div>

    <!--navbar-->

    <!--collegamenti x js e gsap-->
